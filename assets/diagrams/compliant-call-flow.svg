<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" width="800" height="520"
     font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">

  <!-- Background -->
  <rect width="800" height="520" fill="#0a1628" rx="14"/>

  <!-- Title bar -->
  <rect width="800" height="40" fill="#0d1e30" rx="14"/>
  <rect width="800" height="20" y="20" fill="#0d1e30"/>
  <text x="400" y="26" text-anchor="middle" fill="#44cc77" font-size="11" font-weight="700" letter-spacing="2">✅  NHID-CLINICAL COMPLIANT CALL FLOW</text>

  <!-- Column headers -->
  <rect x="60" y="52" width="180" height="36" rx="6" fill="#1a3a5a" stroke="#3a6080" stroke-width="1"/>
  <text x="150" y="75" text-anchor="middle" fill="#7ab3e0" font-size="11" font-weight="700">AI VOICE AGENT</text>

  <rect x="560" y="52" width="180" height="36" rx="6" fill="#1a3a2a" stroke="#3a6040" stroke-width="1"/>
  <text x="650" y="75" text-anchor="middle" fill="#44cc77" font-size="11" font-weight="700">PAYER REP</text>

  <!-- Lifelines -->
  <line x1="150" y1="88" x2="150" y2="490" stroke="#1e3a55" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="650" y1="88" x2="650" y2="490" stroke="#1e3a55" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- ── Step 1: AI discloses identity ── -->
  <!-- Arrow AI→Payer -->
  <line x1="150" y1="130" x2="638" y2="130" stroke="#44cc77" stroke-width="1.5" marker-end="url(#ag)"/>
  <!-- Message bubble -->
  <rect x="165" y="108" width="330" height="36" rx="6" fill="#0d2a1a" stroke="#2a6040" stroke-width="1"/>
  <text x="330" y="122" text-anchor="middle" fill="#44cc77" font-size="9" font-weight="600">"Hello, I am an automated system calling</text>
  <text x="330" y="136" text-anchor="middle" fill="#44cc77" font-size="9">on behalf of Dr. Smith's Office, NPI 1234567890"</text>
  <!-- Annotation -->
  <rect x="506" y="105" width="148" height="34" rx="4" fill="#0d2a1a" stroke="#44cc77" stroke-width="1"/>
  <text x="580" y="118" text-anchor="middle" fill="#44cc77" font-size="8" font-weight="700">✅ Identity Disclosed</text>
  <text x="580" y="130" text-anchor="middle" fill="#44cc77" font-size="8">BEFORE data request</text>

  <!-- ── Step 2: Payer acknowledges ── -->
  <line x1="650" y1="175" x2="162" y2="175" stroke="#7ab3e0" stroke-width="1.5" marker-end="url(#ab)"/>
  <rect x="305" y="160" width="210" height="22" rx="5" fill="#0d1e30" stroke="#2a4a6a" stroke-width="1"/>
  <text x="410" y="175" text-anchor="middle" fill="#8aa8c4" font-size="9">"Thank you. How can I help you?"</text>

  <!-- ── Step 3: AI requests data ── -->
  <line x1="150" y1="220" x2="638" y2="220" stroke="#44cc77" stroke-width="1.5" marker-end="url(#ag)"/>
  <rect x="165" y="206" width="310" height="22" rx="5" fill="#0d2a1a" stroke="#2a6040" stroke-width="1"/>
  <text x="320" y="221" text-anchor="middle" fill="#44cc77" font-size="9">"I need claim status. May I have the member ID?"</text>
  <!-- Annotation -->
  <rect x="500" y="204" width="154" height="22" rx="4" fill="#0d2a1a" stroke="#44cc77" stroke-width="1"/>
  <text x="577" y="218" text-anchor="middle" fill="#44cc77" font-size="8">✅ Data gate passed</text>

  <!-- ── Step 4: Payer provides data ── -->
  <line x1="650" y1="262" x2="162" y2="262" stroke="#7ab3e0" stroke-width="1.5" marker-end="url(#ab)"/>
  <rect x="305" y="249" width="210" height="22" rx="5" fill="#0d1e30" stroke="#2a4a6a" stroke-width="1"/>
  <text x="410" y="264" text-anchor="middle" fill="#8aa8c4" font-size="9">"Member ID 12345678"</text>

  <!-- ── Step 5: AI responds ── -->
  <line x1="150" y1="305" x2="638" y2="305" stroke="#44cc77" stroke-width="1.5" marker-end="url(#ag)"/>
  <rect x="165" y="291" width="310" height="22" rx="5" fill="#0d2a1a" stroke="#2a6040" stroke-width="1"/>
  <text x="320" y="306" text-anchor="middle" fill="#44cc77" font-size="9">"Claim processed 04/15/2026, payment pending"</text>

  <!-- ── Escalation box ── -->
  <rect x="80" y="326" width="640" height="110" rx="8" fill="#0d1e30" stroke="#2a4a6a" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="400" y="342" text-anchor="middle" fill="#6688aa" font-size="9" font-style="italic">alt — Human Escalation Needed</text>

  <line x1="650" y1="360" x2="162" y2="360" stroke="#7ab3e0" stroke-width="1.5" marker-end="url(#ab)"/>
  <rect x="305" y="347" width="210" height="22" rx="5" fill="#0d1e30" stroke="#2a4a6a" stroke-width="1"/>
  <text x="410" y="362" text-anchor="middle" fill="#8aa8c4" font-size="9">"I need to speak with a human"</text>

  <line x1="150" y1="400" x2="638" y2="400" stroke="#44cc77" stroke-width="1.5" marker-end="url(#ag)"/>
  <rect x="165" y="386" width="310" height="22" rx="5" fill="#0d2a1a" stroke="#2a6040" stroke-width="1"/>
  <text x="320" y="401" text-anchor="middle" fill="#44cc77" font-size="9">"Reference REF-2026-001. Transferring now..."</text>

  <!-- ── Outcome ── -->
  <rect x="130" y="452" width="540" height="32" rx="8" fill="#0d2a1a" stroke="#44cc77" stroke-width="1.5"/>
  <text x="400" y="472" text-anchor="middle" fill="#44cc77" font-size="11" font-weight="700">✅ CALL COMPLETE — Context Preserved</text>

  <defs>
    <marker id="ab" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#7ab3e0"/>
    </marker>
    <marker id="ag" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#44cc77"/>
    </marker>
  </defs>
</svg>
