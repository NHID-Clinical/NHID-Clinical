<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 700">
  <defs>
    <linearGradient id="successGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#059669;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#047857;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#059669" />
    </marker>
  </defs>

  <!-- Header Banner -->
  <rect x="0" y="0" width="800" height="60" fill="url(#successGrad)"/>
  <text x="400" y="35" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="white" text-anchor="middle">
    ✅ Compliant Call Flow
  </text>

  <!-- Step 1: Call Initiated -->
  <rect x="50" y="90" width="700" height="70" rx="8" fill="#f0fdf4" stroke="#059669" stroke-width="2" filter="url(#shadow)"/>
  <text x="70" y="115" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#047857">Step 1: Call Initiated</text>
  <text x="70" y="140" font-family="Arial, sans-serif" font-size="13" fill="#065f46">AI agent connects to payer customer service</text>

  <!-- Arrow 1 -->
  <line x1="400" y1="160" x2="400" y2="190" stroke="#059669" stroke-width="2" marker-end="url(#arrowGreen)"/>

  <!-- Step 2: Identity Disclosure (BEFORE DATA) -->
  <rect x="50" y="190" width="700" height="90" rx="8" fill="#dcfce7" stroke="#059669" stroke-width="3" filter="url(#shadow)"/>
  <text x="70" y="215" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#047857">✓ Step 2: Identity Disclosure (BEFORE DATA EXCHANGE)</text>
  <text x="70" y="240" font-family="Arial, sans-serif" font-size="13" fill="#065f46">"Hello, this is an automated system calling on behalf of</text>
  <text x="70" y="260" font-family="Arial, sans-serif" font-size="13" fill="#065f46">Dr. Smith's Dental Office, NPI 1234567890. I can assist with claim status."</text>

  <!-- Arrow 2 -->
  <line x1="400" y1="280" x2="400" y2="310" stroke="#059669" stroke-width="2" marker-end="url(#arrowGreen)"/>

  <!-- Step 3: Authorization Verification -->
  <rect x="50" y="310" width="700" height="90" rx="8" fill="#dcfce7" stroke="#059669" stroke-width="3" filter="url(#shadow)"/>
  <text x="70" y="335" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#047857">✓ Step 3: Authorization Verification</text>
  <text x="70" y="360" font-family="Arial, sans-serif" font-size="13" fill="#065f46">Payer rep verifies AI caller credentials against trusted registry</text>
  <text x="70" y="380" font-family="Arial, sans-serif" font-size="13" fill="#065f46">or validates digital token/BAA-linked reference code</text>

  <!-- Arrow 3 -->
  <line x1="400" y1="400" x2="400" y2="430" stroke="#059669" stroke-width="2" marker-end="url(#arrowGreen)"/>

  <!-- Step 4: Data Exchange -->
  <rect x="50" y="430" width="700" height="70" rx="8" fill="#f0fdf4" stroke="#059669" stroke-width="2" filter="url(#shadow)"/>
  <text x="70" y="455" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#047857">Step 4: Secure Data Exchange</text>
  <text x="70" y="480" font-family="Arial, sans-serif" font-size="13" fill="#065f46">AI provides authentication → Rep shares claim status, eligibility info</text>

  <!-- Arrow 4 -->
  <line x1="400" y1="500" x2="400" y2="530" stroke="#059669" stroke-width="2" marker-end="url(#arrowGreen)"/>

  <!-- Step 5: Escalation Available -->
  <rect x="50" y="530" width="700" height="70" rx="8" fill="#f0fdf4" stroke="#059669" stroke-width="2" filter="url(#shadow)"/>
  <text x="70" y="555" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#047857">Step 5: Escalation Available (if needed)</text>
  <text x="70" y="580" font-family="Arial, sans-serif" font-size="13" fill="#065f46">Clear path to human agent with context preserved + Reference ID</text>

  <!-- Arrow 5 -->
  <line x1="400" y1="600" x2="400" y2="630" stroke="#059669" stroke-width="2" marker-end="url(#arrowGreen)"/>

  <!-- Step 6: Success -->
  <rect x="50" y="630" width="700" height="50" rx="8" fill="#047857" stroke="#065f46" stroke-width="3" filter="url(#shadow)"/>
  <text x="400" y="662" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white" text-anchor="middle">
    ✅ WORKFLOW COMPLETE — Fast, Secure, Auditable
  </text>
</svg>
