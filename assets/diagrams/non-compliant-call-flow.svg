<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="warningGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#dc2626;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#991b1b;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
    <marker id="arrowRed" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#dc2626" />
    </marker>
  </defs>

  <!-- Header Banner -->
  <rect x="0" y="0" width="800" height="60" fill="url(#warningGrad)"/>
  <text x="400" y="35" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="white" text-anchor="middle">
    ❌ Non-Compliant Call Flow
  </text>

  <!-- Step 1: Call Initiated -->
  <rect x="50" y="90" width="700" height="70" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="2" filter="url(#shadow)"/>
  <text x="70" y="115" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#991b1b">Step 1: Call Initiated</text>
  <text x="70" y="140" font-family="Arial, sans-serif" font-size="13" fill="#7f1d1d">AI agent calls payer without disclosure</text>

  <!-- Dashed Arrow 1 -->
  <line x1="400" y1="160" x2="400" y2="190" stroke="#dc2626" stroke-width="2" stroke-dasharray="5,5" marker-end="url(#arrowRed)"/>

  <!-- Step 2: Greeting -->
  <rect x="50" y="190" width="700" height="70" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="2" filter="url(#shadow)"/>
  <text x="70" y="215" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#991b1b">Step 2: Deceptive Greeting</text>
  <text x="70" y="240" font-family="Arial, sans-serif" font-size="13" fill="#7f1d1d">"Hi, this is Sarah. Can I get your NPI?" — Human name with no AI qualifier</text>

  <!-- Dashed Arrow 2 -->
  <line x1="400" y1="260" x2="400" y2="290" stroke="#dc2626" stroke-width="2" stroke-dasharray="5,5" marker-end="url(#arrowRed)"/>

  <!-- Step 3: PHI Exposure Risk -->
  <rect x="50" y="290" width="700" height="70" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="3" filter="url(#shadow)"/>
  <text x="70" y="315" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#991b1b">⚠️ Step 3: PHI Exposure Risk</text>
  <text x="70" y="340" font-family="Arial, sans-serif" font-size="13" fill="#7f1d1d">Payer rep unknowingly shares NPI, Member ID, DOB with undisclosed AI</text>

  <!-- Dashed Arrow 3 -->
  <line x1="400" y1="360" x2="400" y2="390" stroke="#dc2626" stroke-width="2" stroke-dasharray="5,5" marker-end="url(#arrowRed)"/>

  <!-- Step 4: Detection -->
  <rect x="50" y="390" width="700" height="70" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="2" filter="url(#shadow)"/>
  <text x="70" y="415" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#991b1b">Step 4: Detection (Too Late)</text>
  <text x="70" y="440" font-family="Arial, sans-serif" font-size="13" fill="#7f1d1d">Rep asks: "Are you a real person?" — Disclosure only when challenged</text>

  <!-- Dashed Arrow 4 -->
  <line x1="400" y1="460" x2="400" y2="490" stroke="#dc2626" stroke-width="2" stroke-dasharray="5,5" marker-end="url(#arrowRed)"/>

  <!-- Step 5: Call Termination -->
  <rect x="50" y="490" width="700" height="70" rx="8" fill="#7f1d1d" stroke="#991b1b" stroke-width="3" filter="url(#shadow)"/>
  <text x="400" y="520" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white" text-anchor="middle">
    ❌ CALL TERMINATED — Workflow Broken
  </text>
  <text x="400" y="545" font-family="Arial, sans-serif" font-size="13" fill="#fee2e2" text-anchor="middle">
    "We do not speak with AI agents. Please have a human representative call back."
  </text>
</svg>
