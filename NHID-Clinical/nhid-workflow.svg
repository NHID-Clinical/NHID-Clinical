<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 820" width="920" height="820"
     font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
  <defs>
    <marker id="ab" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#7ab3e0"/>
    </marker>
    <marker id="ar" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#cc5555"/>
    </marker>
    <marker id="ag" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#44cc77"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="920" height="820" fill="#0a1628" rx="16"/>

  <!-- Subtle grid -->
  <g stroke="#0d2040" stroke-width="1">
    <line x1="0" y1="100" x2="920" y2="100"/>
    <line x1="0" y1="200" x2="920" y2="200"/>
    <line x1="0" y1="300" x2="920" y2="300"/>
    <line x1="0" y1="400" x2="920" y2="400"/>
    <line x1="0" y1="500" x2="920" y2="500"/>
    <line x1="0" y1="600" x2="920" y2="600"/>
    <line x1="0" y1="700" x2="920" y2="700"/>
  </g>

  <!-- Title -->
  <text x="360" y="14" text-anchor="middle" fill="#3a5570" font-size="10" letter-spacing="2" font-weight="600">NHID-CLINICAL v1.2  ·  CALL STATE MACHINE</text>

  <!-- ══ ARROWS (drawn before nodes) ══ -->

  <!-- Main flow: straight down -->
  <line x1="360" y1="64" x2="360" y2="114" stroke="#7ab3e0" stroke-width="1.5" marker-end="url(#ab)"/>
  <line x1="360" y1="162" x2="360" y2="222" stroke="#7ab3e0" stroke-width="1.5" marker-end="url(#ab)"/>
  <line x1="360" y1="270" x2="360" y2="330" stroke="#7ab3e0" stroke-width="1.5" marker-end="url(#ab)"/>
  <line x1="360" y1="378" x2="360" y2="438" stroke="#7ab3e0" stroke-width="1.5" marker-end="url(#ab)"/>
  <line x1="360" y1="490" x2="360" y2="550" stroke="#7ab3e0" stroke-width="1.5" marker-end="url(#ab)"/>

  <!-- Arrow labels: main flow -->
  <text x="368" y="194" fill="#7ab3e0" font-size="9">✅ PASS: identity + org + purpose disclosed</text>
  <text x="368" y="304" fill="#7ab3e0" font-size="9">✅ VALID: verified provider context</text>
  <text x="368" y="524" fill="#7ab3e0" font-size="9">Escalation requested / human needed</text>

  <!-- E self-loop (Normal interaction) -->
  <path d="M580,449 H624 V469 H580" stroke="#7ab3e0" stroke-width="1.5" fill="none" marker-end="url(#ab)"/>
  <text x="628" y="453" fill="#7ab3e0" font-size="9">Normal</text>
  <text x="628" y="464" fill="#7ab3e0" font-size="9">interaction</text>

  <!-- Fail path: B→Z -->
  <path d="M580,138 H755 V218" stroke="#cc5555" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <text x="588" y="131" fill="#cc5555" font-size="9">❌ FAIL: missing or incomplete disclosure</text>

  <!-- Fail path: C→Z -->
  <path d="M580,246 H640" stroke="#cc5555" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <text x="584" y="240" fill="#cc5555" font-size="9">❌ INVALID / UNKNOWN</text>

  <!-- Fail path: E→Z (right rail) -->
  <path d="M580,478 H896 V250 H870" stroke="#cc5555" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <text x="584" y="487" fill="#cc5555" font-size="9">Policy violation detected mid-call</text>

  <!-- Fail path: Z→END (far-right rail down) -->
  <path d="M870,250 H906 V776 H580" stroke="#cc5555" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>

  <!-- Success paths: F→G and F→H -->
  <path d="M360,598 H165 V658" stroke="#44cc77" stroke-width="1.5" fill="none" marker-end="url(#ag)"/>
  <text x="172" y="630" fill="#44cc77" font-size="9">Human available</text>

  <path d="M360,598 H555 V658" stroke="#44cc77" stroke-width="1.5" fill="none" marker-end="url(#ag)"/>
  <text x="370" y="630" fill="#44cc77" font-size="9">No human available</text>

  <!-- G→END and H→END -->
  <line x1="165" y1="706" x2="165" y2="754" stroke="#44cc77" stroke-width="1.5" marker-end="url(#ag)"/>
  <line x1="555" y1="706" x2="555" y2="754" stroke="#44cc77" stroke-width="1.5" marker-end="url(#ag)"/>

  <!-- ══ NODES ══ -->

  <!-- A: CALL INITIATION (process pill) -->
  <rect x="140" y="20" width="440" height="44" rx="22" fill="#d1ecf1" stroke="#0c5460" stroke-width="2"/>
  <text x="360" y="47" text-anchor="middle" fill="#0c5460" font-size="13" font-weight="700">CALL INITIATION</text>

  <!-- B: AI IDENTITY DISCLOSURE GATE (gate) -->
  <rect x="140" y="114" width="440" height="48" rx="6" fill="#fff3cd" stroke="#d39e00" stroke-width="2"/>
  <text x="360" y="134" text-anchor="middle" fill="#6a4c00" font-size="12" font-weight="700">AI IDENTITY DISCLOSURE GATE</text>
  <text x="360" y="152" text-anchor="middle" fill="#8a6800" font-size="9">Non-human status  ·  Represented org  ·  Call purpose</text>

  <!-- C: AUTHORIZATION CONTEXT CHECK (gate) -->
  <rect x="140" y="222" width="440" height="48" rx="6" fill="#fff3cd" stroke="#d39e00" stroke-width="2"/>
  <text x="360" y="242" text-anchor="middle" fill="#6a4c00" font-size="12" font-weight="700">AUTHORIZATION CONTEXT CHECK</text>
  <text x="360" y="260" text-anchor="middle" fill="#8a6800" font-size="9">Verified provider context  ·  NPI  ·  Call purpose binding</text>

  <!-- D: PRE-DATA EXCHANGE GATE (gate) -->
  <rect x="140" y="330" width="440" height="48" rx="6" fill="#fff3cd" stroke="#d39e00" stroke-width="2"/>
  <text x="360" y="350" text-anchor="middle" fill="#6a4c00" font-size="12" font-weight="700">PRE-DATA EXCHANGE GATE</text>
  <text x="360" y="368" text-anchor="middle" fill="#8a6800" font-size="9">All disclosures verified  ·  Data exchange permitted</text>

  <!-- E: OPERATIONAL DATA EXCHANGE LOOP (process) -->
  <rect x="140" y="438" width="440" height="52" rx="6" fill="#d1ecf1" stroke="#0c5460" stroke-width="2"/>
  <text x="360" y="459" text-anchor="middle" fill="#0c5460" font-size="12" font-weight="700">OPERATIONAL DATA EXCHANGE LOOP</text>
  <text x="360" y="477" text-anchor="middle" fill="#0c5460" font-size="9">NPI  ·  Member ID  ·  Claim data  ·  Eligibility info</text>

  <!-- F: ESCALATION TRIGGER (process) -->
  <rect x="140" y="550" width="440" height="48" rx="6" fill="#d1ecf1" stroke="#0c5460" stroke-width="2"/>
  <text x="360" y="570" text-anchor="middle" fill="#0c5460" font-size="12" font-weight="700">ESCALATION TRIGGER</text>
  <text x="360" y="588" text-anchor="middle" fill="#0c5460" font-size="9">Human requested or failure threshold reached</text>

  <!-- G: HUMAN HANDOFF (success) -->
  <rect x="40" y="658" width="250" height="48" rx="6" fill="#d4edda" stroke="#155724" stroke-width="2"/>
  <text x="165" y="678" text-anchor="middle" fill="#155724" font-size="11" font-weight="700">HUMAN HANDOFF</text>
  <text x="165" y="696" text-anchor="middle" fill="#155724" font-size="9">Live transfer  ·  Context + Reference ID</text>

  <!-- H: CALLBACK / SAFE FAILOVER (success) -->
  <rect x="430" y="658" width="250" height="48" rx="6" fill="#d4edda" stroke="#155724" stroke-width="2"/>
  <text x="555" y="678" text-anchor="middle" fill="#155724" font-size="11" font-weight="700">CALLBACK / SAFE FAILOVER</text>
  <text x="555" y="696" text-anchor="middle" fill="#155724" font-size="9">Scheduled callback  ·  Reference ID</text>

  <!-- Z: TERMINATE CALL (fail) -->
  <rect x="640" y="218" width="230" height="64" rx="6" fill="#f8d7da" stroke="#721c24" stroke-width="2"/>
  <text x="755" y="241" text-anchor="middle" fill="#721c24" font-size="12" font-weight="700">TERMINATE CALL</text>
  <text x="755" y="257" text-anchor="middle" fill="#721c24" font-size="9">Non-compliant disclosure</text>
  <text x="755" y="271" text-anchor="middle" fill="#721c24" font-size="9">or policy violation detected</text>

  <!-- END STATE (success pill) -->
  <rect x="140" y="754" width="440" height="44" rx="22" fill="#d4edda" stroke="#155724" stroke-width="2.5"/>
  <text x="360" y="781" text-anchor="middle" fill="#155724" font-size="13" font-weight="700">END STATE — COMPLETED</text>

  <!-- Legend -->
  <rect x="640" y="720" width="258" height="82" rx="6" fill="#0d1e30" stroke="#1e3a55" stroke-width="1"/>
  <text x="769" y="737" text-anchor="middle" fill="#6688aa" font-size="9" font-weight="600" letter-spacing="1">LEGEND</text>
  <rect x="650" y="744" width="10" height="10" rx="2" fill="#d1ecf1" stroke="#0c5460" stroke-width="1"/>
  <text x="666" y="753" fill="#aabbcc" font-size="9">Process node</text>
  <rect x="650" y="760" width="10" height="10" rx="2" fill="#fff3cd" stroke="#d39e00" stroke-width="1"/>
  <text x="666" y="769" fill="#aabbcc" font-size="9">Gate / check</text>
  <rect x="650" y="776" width="10" height="10" rx="2" fill="#d4edda" stroke="#155724" stroke-width="1"/>
  <text x="666" y="785" fill="#aabbcc" font-size="9">Compliant exit</text>
  <rect x="752" y="744" width="10" height="10" rx="2" fill="#f8d7da" stroke="#721c24" stroke-width="1"/>
  <text x="768" y="753" fill="#aabbcc" font-size="9">Non-compliant / terminate</text>
</svg>
