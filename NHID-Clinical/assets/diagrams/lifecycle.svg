<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 620" width="780" height="620" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">

  <!-- Background -->
  <rect width="780" height="620" fill="#f7f8fa" rx="4"/>

  <!-- Title -->
  <text x="390" y="36" text-anchor="middle" font-size="13.5" font-weight="700" fill="#1e3a5f" letter-spacing="0.02em">NHID-Clinical Lifecycle for Healthcare AI Voice Agents</text>
  <text x="390" y="53" text-anchor="middle" font-size="10" fill="#8a97a6" letter-spacing="0.04em">ILLUSTRATIVE · CONCEPTUAL PROTOTYPE · NOT REGULATORY GUIDANCE</text>

  <!-- ── Ring track ─────────────────────────────────────────────── -->
  <circle cx="390" cy="320" r="190" fill="none" stroke="#dde5ee" stroke-width="38" opacity="0.55"/>
  <circle cx="390" cy="320" r="171" fill="none" stroke="#c8d4e2" stroke-width="0.75"/>
  <circle cx="390" cy="320" r="209" fill="none" stroke="#c8d4e2" stroke-width="0.75"/>

  <!-- ── Clockwise arrow markers on ring (between each stage) ────── -->
  <!-- Between 1 and 2 (~296°): top-right arc -->
  <path d="M 463,156 L 471,150 L 473,159" fill="none" stroke="#4a7ab5" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Between 2 and 3 (~347°): right arc -->
  <path d="M 571,278 L 580,280 L 574,287" fill="none" stroke="#4a7ab5" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Between 3 and 4 (~38°): lower-right arc -->
  <path d="M 537,450 L 533,458 L 525,453" fill="none" stroke="#4a7ab5" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Between 4 and 5 (~90°): bottom arc -->
  <path d="M 400,511 L 391,514 L 391,505" fill="none" stroke="#4a7ab5" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Between 5 and 6 (~141°): lower-left arc -->
  <path d="M 241,449 L 237,457 L 246,457" fill="none" stroke="#4a7ab5" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Between 6 and 7 (~192°): left arc -->
  <path d="M 200,283 L 193,284 L 196,276" fill="none" stroke="#4a7ab5" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Between 7 and 1 (~244°): upper-left arc -->
  <path d="M 301,150 L 298,142 L 307,143" fill="none" stroke="#4a7ab5" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- ── Center box ─────────────────────────────────────────────── -->
  <rect x="298" y="258" width="184" height="124" rx="4" fill="#1e3a5f"/>
  <text x="390" y="278" text-anchor="middle" font-size="8.5" font-weight="700" fill="#7aabd4" letter-spacing="0.1em">CONTROL FAMILIES</text>
  <line x1="308" y1="283" x2="472" y2="283" stroke="#2d5080" stroke-width="0.75"/>
  <text x="390" y="297" text-anchor="middle" font-size="9.5" fill="#ddeaf8">Identity Disclosure</text>
  <text x="390" y="311" text-anchor="middle" font-size="9.5" fill="#ddeaf8">Authorization &amp; Identity Assurance</text>
  <text x="390" y="325" text-anchor="middle" font-size="9.5" fill="#ddeaf8">Consent &amp; Data Use</text>
  <text x="390" y="339" text-anchor="middle" font-size="9.5" fill="#ddeaf8">Safety &amp; Escalation</text>
  <text x="390" y="353" text-anchor="middle" font-size="9.5" fill="#ddeaf8">Logging &amp; Audit</text>
  <text x="390" y="367" text-anchor="middle" font-size="9.5" fill="#ddeaf8">Governance &amp; Training</text>
  <text x="390" y="378" text-anchor="middle" font-size="7.5" fill="#5a82ae" font-style="italic">applied throughout all stages</text>

  <!-- ═══════════════════════════════════════════════════════════════
       Stage nodes — clockwise from top
       r=190, center=(390,320)
       Stage N angle = 270° + (N-1) × 51.43°

       1:  270° → (390, 130)
       2:  321.4° → (390+190×cos321.4°, 320+190×sin321.4°)
               cos321.4°=0.781  sin321.4°=-0.625
               → (390+148, 320−119) = (538, 201)
       3:  12.9°  → cos12.9°=0.975 sin12.9°=0.223
               → (390+185, 320+42) = (575, 362)
       4:  64.3°  → cos64.3°=0.434 sin64.3°=0.901
               → (390+82, 320+171) = (472, 491)
       5:  115.7° → cos115.7°=-0.434 sin115.7°=0.901
               → (390-82, 320+171) = (308, 491)
       6:  167.1° → cos167.1°=-0.975 sin167.1°=0.223
               → (390-185, 320+42) = (205, 362)
       7:  218.6° → cos218.6°=-0.781 sin218.6°=-0.625
               → (390-148, 320-119) = (242, 201)
  ═══════════════════════════════════════════════════════════════ -->

  <!-- Stage 1: Intake & Design Review — top -->
  <circle cx="390" cy="130" r="29" fill="#1e3a5f" stroke="#ffffff" stroke-width="2.5"/>
  <text x="390" y="126" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">1</text>
  <text x="390" y="139" text-anchor="middle" font-size="7.5" fill="#90b8d8" letter-spacing="0.05em">INTAKE</text>
  <!-- Label above ring -->
  <text x="390" y="90" text-anchor="middle" font-size="10.5" font-weight="600" fill="#1e3a5f">Intake &amp; Design Review</text>

  <!-- Stage 2: Pre-Deployment Testing — upper right -->
  <circle cx="538" cy="201" r="29" fill="#1e3a5f" stroke="#ffffff" stroke-width="2.5"/>
  <text x="538" y="197" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">2</text>
  <text x="538" y="210" text-anchor="middle" font-size="7.5" fill="#90b8d8" letter-spacing="0.05em">PRE-DEPLOY</text>
  <!-- Label outside upper-right -->
  <text x="590" y="168" text-anchor="start" font-size="10.5" font-weight="600" fill="#1e3a5f">Pre-Deployment</text>
  <text x="590" y="181" text-anchor="start" font-size="10.5" font-weight="600" fill="#1e3a5f">Testing &amp; Validation</text>

  <!-- Stage 3: Controlled Deployment — right -->
  <circle cx="575" cy="362" r="29" fill="#1e3a5f" stroke="#ffffff" stroke-width="2.5"/>
  <text x="575" y="358" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">3</text>
  <text x="575" y="371" text-anchor="middle" font-size="7.5" fill="#90b8d8" letter-spacing="0.05em">DEPLOY</text>
  <!-- Label outside right -->
  <text x="618" y="357" text-anchor="start" font-size="10.5" font-weight="600" fill="#1e3a5f">Controlled Deployment</text>
  <text x="618" y="370" text-anchor="start" font-size="10.5" font-weight="600" fill="#1e3a5f">&amp; Change Mgmt</text>

  <!-- Stage 4: Continuous Monitoring — lower right -->
  <circle cx="472" cy="491" r="29" fill="#1e3a5f" stroke="#ffffff" stroke-width="2.5"/>
  <text x="472" y="487" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">4</text>
  <text x="472" y="500" text-anchor="middle" font-size="7.5" fill="#90b8d8" letter-spacing="0.05em">MONITOR</text>
  <!-- Label below lower-right -->
  <text x="480" y="536" text-anchor="middle" font-size="10.5" font-weight="600" fill="#1e3a5f">Continuous Monitoring</text>
  <text x="480" y="549" text-anchor="middle" font-size="10.5" font-weight="600" fill="#1e3a5f">&amp; Telemetry</text>

  <!-- Stage 5: Incident Response — lower left -->
  <circle cx="308" cy="491" r="29" fill="#1e3a5f" stroke="#ffffff" stroke-width="2.5"/>
  <text x="308" y="487" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">5</text>
  <text x="308" y="500" text-anchor="middle" font-size="7.5" fill="#90b8d8" letter-spacing="0.05em">INCIDENT</text>
  <!-- Label below lower-left -->
  <text x="300" y="536" text-anchor="middle" font-size="10.5" font-weight="600" fill="#1e3a5f">Incident Response</text>
  <text x="300" y="549" text-anchor="middle" font-size="10.5" font-weight="600" fill="#1e3a5f">&amp; Corrective Actions</text>

  <!-- Stage 6: Periodic Review — left -->
  <circle cx="205" cy="362" r="29" fill="#1e3a5f" stroke="#ffffff" stroke-width="2.5"/>
  <text x="205" y="358" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">6</text>
  <text x="205" y="371" text-anchor="middle" font-size="7.5" fill="#90b8d8" letter-spacing="0.05em">REVIEW</text>
  <!-- Label outside left, right-aligned -->
  <text x="162" y="357" text-anchor="end" font-size="10.5" font-weight="600" fill="#1e3a5f">Periodic Review</text>
  <text x="162" y="370" text-anchor="end" font-size="10.5" font-weight="600" fill="#1e3a5f">&amp; Recertification</text>

  <!-- Stage 7: Decommissioning — upper left -->
  <circle cx="242" cy="201" r="29" fill="#3a6496" stroke="#ffffff" stroke-width="2.5"/>
  <text x="242" y="197" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">7</text>
  <text x="242" y="210" text-anchor="middle" font-size="7.5" fill="#b0cce4" letter-spacing="0.05em">DECOM</text>
  <!-- Label outside upper-left -->
  <text x="188" y="175" text-anchor="end" font-size="10.5" font-weight="600" fill="#1e3a5f">Decommissioning</text>

  <!-- ── Footer ─────────────────────────────────────────────────── -->
  <text x="390" y="607" text-anchor="middle" font-size="9" fill="#a8b5c2">
    Conceptual illustration only. NHID-Clinical is an early-stage open proposal — not an accredited standard or regulatory requirement.
  </text>

</svg>
