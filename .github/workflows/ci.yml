name: CI

on:
  push:
    branches: ["main", "claude/*", "feature/*"]
  pull_request:
    branches: ["main"]

jobs:
  unit-invariant:
    name: "Unit invariant: 270 passed, 0 skipped"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Validate test invariants
        run: python scripts/validate_ci.py
