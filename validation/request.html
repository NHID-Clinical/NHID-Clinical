<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Request NHID-Clinical Validation</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            line-height: 1.6;
            color: #1a1a1a;
            background: #f8f9fa;
        }
        .container { max-width: 700px; margin: 60px auto; padding: 0 20px; }
        .card { background: white; padding: 50px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        h1 { color: #2563eb; margin-bottom: 10px; }
        .subtitle { color: #6b7280; margin-bottom: 40px; }

        .form-group { margin-bottom: 25px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; color: #374151; }
        input, textarea, select {
            width: 100%;
            padding: 12px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            font-size: 1rem;
            font-family: inherit;
        }
        textarea { min-height: 120px; resize: vertical; }
        select { cursor: pointer; }

        .submit-btn {
            background: #2563eb;
            color: white;
            padding: 14px 30px;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: background 0.3s;
        }
        .submit-btn:hover { background: #1d4ed8; }

        .back-link {
            display: inline-block;
            margin-bottom: 30px;
            color: #2563eb;
            text-decoration: none;
        }
        .back-link:hover { text-decoration: underline; }

        .success-message {
            display: none;
            background: #10b981;
            color: white;
            padding: 20px;
            border-radius: 6px;
            margin-bottom: 20px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-link">← Back to Validation Program</a>

        <div class="card">
            <h1>Request Validation</h1>
            <p class="subtitle">We'll review your request and send you the conformance test within 3 business days</p>

            <div class="success-message" id="successMessage">
                Thank you! Your validation request has been submitted. Check your email for next steps.
            </div>

            <form id="validationForm" action="https://formspree.io/f/mbdwrbwg" method="POST">
                <div class="form-group">
                    <label for="company">Company Name *</label>
                    <input type="text" id="company" name="company" required>
                </div>

                <div class="form-group">
                    <label for="email">Contact Email *</label>
                    <input type="email" id="email" name="email" required>
                </div>

                <div class="form-group">
                    <label for="name">Contact Name *</label>
                    <input type="text" id="name" name="name" required>
                </div>

                <div class="form-group">
                    <label for="tier">Target Certification Level *</label>
                    <select id="tier" name="tier" required>
                        <option value="">Select a tier...</option>
                        <option value="L1">L1 Baseline</option>
                        <option value="L2">L2 Operational</option>
                        <option value="L3">L3 Enterprise</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="description">Brief description of your AI voice agent system *</label>
                    <textarea id="description" name="description" placeholder="What does your system do? What workflows does it handle?" required></textarea>
                </div>

                <div class="form-group">
                    <label for="timeline">Desired validation timeline (optional)</label>
                    <input type="text" id="timeline" name="timeline" placeholder="e.g., 'ASAP' or 'Q3 2026'">
                </div>

                <button type="submit" class="submit-btn">Submit Request</button>
            </form>
        </div>
    </div>

    <script>
        document.getElementById('validationForm').addEventListener('submit', function(e) {
            // Form will submit to Formspree
            // Show success message after submission
            setTimeout(function() {
                document.getElementById('successMessage').style.display = 'block';
                document.getElementById('validationForm').reset();
            }, 1000);
        });
    </script>
</body>
</html>
