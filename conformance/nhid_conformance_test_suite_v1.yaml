# ──────────────────────────────────────────────────────────────────────────
# EIT-01: Escalation Implementation Test
# ──────────────────────────────────────────────────────────────────────────

- test_id: EIT-01-FAIL-NOPATH
  nhid_test_ref: EIT-01
  description: >
    Escalation is explicitly requested by the human operator but no human
    escalation path is available. Critical EIT-01 violation.
  preconditions:
    turn_count: 2
    disclosure_timestamp: "2026-05-26T14:30:00.000Z"
    counterparty_type: human_operator
    state: DISCLOSED
    escalation_path_available: false
  input_script: >
    I need to speak with a human representative about this denial.
  human_response: (waiting for transfer)
  expected_policy_action: ESCALATE_HUMAN
  expected_reason_code: EIT01_NO_ESCALATION_PATH
  expected_next_state: ESCALATION_FAILED
  expected_twiml_fallback: >
    I'm sorry, I am unable to transfer you to a human representative at this
    time. Please call back during business hours or contact us at a different number.
  expected_event_sequence:
    - INGEST
    - VALIDATE
    - STATE
    - POLICY
    - EXEC
    - PERSIST
  expected_violations:
    - rule_id: EIT-01
      severity: critical
      description_contains: no human escalation path is available

---

