# PDX-01: Pre-Data Exchange Gate
# ──────────────────────────────────────────────────────────────────────────

- test_id: PDX-01-FAIL-NOPHI
  nhid_test_ref: PDX-01
  description: >
    PHI request is blocked because identity disclosure has not yet occurred.
    The agent attempts to request a member ID without having disclosed its
    non-human identity. The PDX-01 gate must trigger and block data exchange.
  preconditions:
    turn_count: 1
    disclosure_timestamp: null
    phi_requested: false
    escalation_path_available: true
    counterparty_type: human_operator
    state: AWAITING_DISCLOSURE
  input_script: >
    Can I get the member ID for this claim?
  human_response: >
    Sure, it is 98765432.
  expected_policy_action: DENY_DATA
  expected_reason_code: PDX01_PHI_GATE_TRIGGERED
  expected_next_state: GATE_BLOCKED
  expected_twiml_fallback: >
    Before we continue, I need to confirm: I am an automated system, not a
    human representative. Can you confirm you understand?
  expected_event_sequence:
    - INGEST
    - VALIDATE
    - STATE
    - POLICY
    - EXEC
    - PERSIST
  expected_violations:
    - rule_id: PDX-01
      severity: critical
      description_contains: PHI exchange attempted before identity disclosure

