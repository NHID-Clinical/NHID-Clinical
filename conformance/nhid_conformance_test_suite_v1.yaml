# NHID-Clinical Conformance Test Suite v1
# =========================================
# Machine-readable test cases for NHID-Clinical v1.3 conformance tests.
# Each document defines one test scenario covering a specific pass, fail, or
# edge-case condition.
#
# Test IDs: IDG-01, PDX-01, DBC-01, EIT-01, ATR-01
# Edge cases: EDGE-*, BOT-TO-BOT-*
#
# Implementers: Load this file with a YAML parser and drive your test runner
# against each case. The expected_event_sequence and expected_violations fields
# define the contract your pipeline must satisfy.
#
# NHID-Clinical is a voluntary open proposal. CC BY 4.0.
# Not an accredited standard. Not a regulatory requirement.
# See nhid-clinical.org.

---

