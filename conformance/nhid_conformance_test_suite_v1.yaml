# ──────────────────────────────────────────────────────────────────────────
# Edge cases — input validation and pipeline hardening
# ──────────────────────────────────────────────────────────────────────────

- test_id: EDGE-EMPTY-SPEECH
  nhid_test_ref: EDGE
  description: >
    SpeechResult is an empty string. The pipeline must not crash, must not
    return HTTP 500, and must return a deterministic TwiML fallback. The
    event record must be written. This tests validation boundary discipline.
  preconditions:
    turn_count: 0
    disclosure_timestamp: null
    counterparty_type: human_operator
    state: AWAITING_DISCLOSURE
  http_request:
    method: POST
    path: /voice/process
    content_type: application/x-www-form-urlencoded
    body:
      CallSid: "EDGE-EMPTY-001"
      SpeechResult: ""
  expected_http_status_max: 499
  expected_twiml_returned: true
  expected_event_written: true
  expected_policy_action: DISCLOSE_IDENTITY
  expected_event_sequence:
    - INGEST
    - VALIDATE
    - POLICY
    - PERSIST
  expected_violations:
    - rule_id: IDG-01
      severity: critical

---

- test_id: EDGE-NULL-BYTES
  nhid_test_ref: EDGE
  description: >
    SpeechResult contains null bytes (0x00). This is a common injection
    vector against string-handling pipelines. The system must sanitize input
    and not crash. Deterministic fallback TwiML required. Event trace required.
  preconditions:
    turn_count: 0
    disclosure_timestamp: null
    counterparty_type: human_operator
    state: AWAITING_DISCLOSURE
  http_request:
    method: POST
    path: /voice/process
    content_type: application/x-www-form-urlencoded
    body:
      CallSid: "EDGE-NULL-001"
      SpeechResult: "\x00\x00\x00check claim status"
  expected_http_status_max: 499
  expected_twiml_returned: true
  expected_event_written: true
  expected_policy_action: DISCLOSE_IDENTITY
  expected_event_sequence:
    - INGEST
    - VALIDATE
    - POLICY
    - PERSIST
  expected_violations:
    - rule_id: IDG-01
      severity: critical
  notes: >
    The null bytes must be stripped during VALIDATE stage normalization.
    The resulting speech text should be "check claim status".

---

- test_id: EDGE-MISSING-CALLSID
  nhid_test_ref: EDGE
  description: >
    CallSid field is absent from the inbound request. CallSid is required
    for session binding and idempotency. The system must return HTTP 400
    or a deterministic fallback. Must not return HTTP 500.
  preconditions:
    turn_count: 0
    counterparty_type: unknown
    state: UNKNOWN
  http_request:
    method: POST
    path: /voice/process
    content_type: application/x-www-form-urlencoded
    body:
      SpeechResult: "checking member eligibility"
  expected_http_status_range: [400, 499]
  expected_twiml_returned: false
  expected_event_written: false
  expected_policy_action: null
  notes: >
    Without a CallSid the request cannot be bound to a session. The system
    must reject it at the VALIDATE stage with a 400 response. No event
    should be written because no session_id is available.

---

- test_id: EDGE-MISSING-ALL-FIELDS
  nhid_test_ref: EDGE
  description: >
    HTTP request body is completely empty. Tests the outermost validation
    boundary. Must not return HTTP 500.
  preconditions:
    state: UNKNOWN
  http_request:
    method: POST
    path: /voice/process
    content_type: application/x-www-form-urlencoded
    body: {}
  expected_http_status_range: [400, 499]
  expected_twiml_returned: false
  expected_event_written: false
  expected_policy_action: null

