AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: NHID Clinical Policy Engine - Hosted Conformance API

Parameters:
  ElevenLabsApiKey:
    Type: String
    Default: ""
    NoEcho: true
    Description: ElevenLabs API key for Beacon outbound call triggering
  ElevenLabsPhoneNumberId:
    Type: String
    Default: ""
    Description: ElevenLabs provisioned phone number ID for Beacon outbound calls

Globals:
  Function:
    Timeout: 30
    MemorySize: 256
    Runtime: python3.13

Resources:

  # ── Lambda function ──────────────────────────────────────────────────────
  ConformanceFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: nhid-conformance-check
      Handler: functions.handler.lambda_handler
      # CodeUri: . packages the full repo root so src/ is importable
      CodeUri: .
      Description: NHID Clinical policy engine conformance checker
      Policies:
        - AWSLambdaBasicExecutionRole
      Environment:
        Variables:
          ELEVENLABS_API_KEY: !Ref ElevenLabsApiKey
          ELEVENLABS_PHONE_NUMBER_ID: !Ref ElevenLabsPhoneNumberId
      Events:
        ConformancePost:
          Type: Api
          Properties:
            RestApiId: !Ref NHIDApi
            Path: /v1/conformance/check
            Method: POST
            Auth:
              ApiKeyRequired: true
        DemoPost:
          Type: Api
          Properties:
            RestApiId: !Ref NHIDApi
            Path: /v1/demo/check
            Method: POST
        VapiAdapterPost:
          Type: Api
          Properties:
            RestApiId: !Ref NHIDApi
            Path: /v1/adapters/vapi/check
            Method: POST
        TwilioAdapterPost:
          Type: Api
          Properties:
            RestApiId: !Ref NHIDApi
            Path: /v1/adapters/twilio/check
            Method: POST
        VonageAdapterPost:
          Type: Api
          Properties:
            RestApiId: !Ref NHIDApi
            Path: /v1/adapters/vonage/check
            Method: POST
        RetellAdapterPost:
          Type: Api
          Properties:
            RestApiId: !Ref NHIDApi
            Path: /v1/adapters/retell/check
            Method: POST
        ConnectAdapterPost:
          Type: Api
          Properties:
            RestApiId: !Ref NHIDApi
            Path: /v1/adapters/connect/check
            Method: POST
        DemoCallPost:
          Type: Api
          Properties:
            RestApiId: !Ref NHIDApi
            Path: /v1/demo/call
            Method: POST
        CallProgressPost:
          Type: Api
          Properties:
            RestApiId: !Ref NHIDApi
            Path: /v1/webhooks/call-progress
            Method: POST
        BadgeGet:
          Type: Api
          Properties:
            RestApiId: !Ref NHIDApi
            Path: /v1/public/vendor/{vendor_id}/badge
            Method: GET
        MetricsSummaryGet:
          Type: Api
          Properties:
            RestApiId: !Ref NHIDApi
            Path: /v1/vendor/metrics/summary
            Method: GET
            Auth:
              ApiKeyRequired: true
        PilotEnrollPost:
          Type: Api
          Properties:
            RestApiId: !Ref NHIDApi
            Path: /v1/pilot/enroll
            Method: POST
        CTSEvaluatePost:
          Type: Api
          Properties:
            RestApiId: !Ref NHIDApi
            Path: /v1/cts/evaluate
            Method: POST
        HealthGet:
          Type: Api
          Properties:
            RestApiId: !Ref NHIDApi
            Path: /health
            Method: GET

  # ── API Gateway REST API ─────────────────────────────────────────────────
  NHIDApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: prod
      Description: NHID Clinical Policy Engine API
      Cors:
        AllowMethods: "'POST,GET,OPTIONS'"
        AllowHeaders: "'Content-Type,x-api-key'"
        AllowOrigin: "'*'"

  # ── Usage plan: 50k req/month, 20 req/s sustained, 100 burst ────────────
  NHIDUsagePlan:
    Type: AWS::ApiGateway::UsagePlan
    # SAM names the stage resource as <ApiLogicalId><StageName>Stage
    DependsOn: NHIDApiprodStage
    Properties:
      UsagePlanName: nhid-clinical-plan
      Description: NHID Clinical API monthly quota
      ApiStages:
        - ApiId: !Ref NHIDApi
          Stage: prod
      Quota:
        Limit: 50000
        Period: MONTH
      Throttle:
        BurstLimit: 100
        RateLimit: 20

  # ── Default API key (retrieve value with `make get-key`) ─────────────────
  NHIDDefaultApiKey:
    Type: AWS::ApiGateway::ApiKey
    DependsOn: NHIDApiprodStage
    Properties:
      Name: nhid-clinical-default-key
      Description: Default API key for NHID Clinical
      Enabled: true
      StageKeys:
        - RestApiId: !Ref NHIDApi
          StageName: prod

  NHIDApiKeyToUsagePlan:
    Type: AWS::ApiGateway::UsagePlanKey
    Properties:
      KeyId: !Ref NHIDDefaultApiKey
      KeyType: API_KEY
      UsagePlanId: !Ref NHIDUsagePlan

  # ── CloudWatch log group (30-day retention) ──────────────────────────────
  ConformanceFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${ConformanceFunction}"
      RetentionInDays: 30

Outputs:
  ApiBaseUrl:
    Description: API Gateway base URL
    Value: !Sub "https://${NHIDApi}.execute-api.${AWS::Region}.amazonaws.com/prod"

  ConformanceEndpoint:
    Description: "POST here with x-api-key header to check conformance"
    Value: !Sub "https://${NHIDApi}.execute-api.${AWS::Region}.amazonaws.com/prod/v1/conformance/check"

  HealthEndpoint:
    Description: "GET health check (no auth)"
    Value: !Sub "https://${NHIDApi}.execute-api.${AWS::Region}.amazonaws.com/prod/health"

  ApiKeyId:
    Description: "Run `make get-key` to print the actual key value"
    Value: !Ref NHIDDefaultApiKey
